# CI/CD for the Tellus frontend on gnostr-cloud (uranus). Lets a push PUBLISH straight to the live
# k3s deployment (namespace `tellus`, fronted at tellus.garden / tellus.gnostr.cloud) — no manual
# image build or kubectl needed. Mirrors the fleet's native CI schema (see hyades/.gnostr-cloud-ci.yml):
# top-level `stages:` + `variables:` + `jobs:` with stage / runs-on / rules {branches,tags} / script.
#
# Unlike hyades (whose release is operator-driven), Tellus AUTO-DEPLOYS: the single job builds the
# multi-arch image AND rolls the k3s Deployment, so `git push` == publish.
#
# Runner: `dgx-deploy` — the privileged systemd host runner on dgx-00 (User=ms) with docker + the
# shared `monumental-k8s` buildx builder + the k3s kubeconfig. (The gVisor `ariel` runner can't build
# images or reach the cluster, so it isn't used here; the Dockerfile build runs `tsc --noEmit` +
# `vite build`, so a type/build error fails the image build and reds the deploy.)
#
# The dgx-deploy runner agent must be a `reader` collaborator on this gnostr-cloud repo (else its clone
# 401s) — grant once: `gnostr-cloud-cli repo add-collaborator <repo> <runner-npub> --role reader`.
#
# Trigger: TAG-ONLY. A plain push to `master` does nothing; pushing a `v*` tag (e.g. `v0.2.0`) builds
# + publishes. Intentional-release model so WIP commits never go live. Image tag = the git tag minus
# the leading `v` (`v0.2.0` -> `0.2.0`) — unique per release, so a re-roll never reuses a tag mid-
# rollout (the split-cluster gotcha with IfNotPresent caching).

stages:
  - deploy

variables:
  KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  TELLUS_REGISTRY: "192.168.1.187:30500"
  TELLUS_NAMESPACE: tellus

jobs:
  build-deploy:
    stage: deploy
    runs-on: dgx-deploy
    rules:
      tags:
        - v*
    timeout: 3600
    script:
      - |
        set -euo pipefail
        docker --version
        # Image tag = the git tag minus the leading 'v' (v0.2.0 -> 0.2.0). Tag-only pipeline, so a ref
        # MUST be present; refuse anything that isn't v*.
        REF="${GITHUB_REF_NAME:-}"
        case "${GITHUB_REF:-}" in refs/tags/*) REF="${GITHUB_REF#refs/tags/}" ;; esac
        case "$REF" in
          v*) TAG="${REF#v}" ;;
          *) echo "build-deploy refused non-v* ref '$REF'" >&2; exit 1 ;;
        esac
        echo "building + pushing tellus:$TAG (multi-arch on monumental-k8s)"
        ./deploy/build-push.sh "$TAG"
        echo "rolling deploy/tellus -> tellus:$TAG"
        kubectl -n "${TELLUS_NAMESPACE:-tellus}" set image deploy/tellus \
          tellus="${TELLUS_REGISTRY:-192.168.1.187:30500}/tellus:$TAG"
        kubectl -n "${TELLUS_NAMESPACE:-tellus}" rollout status deploy/tellus --timeout=300s
        echo "published tellus:$TAG to the live deployment"
